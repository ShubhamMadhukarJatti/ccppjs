<!DOCTYPE html>
<html>
    <head>
        <body>
            <h1>Event Handling with HTML Attribute</h1>
            <button onclick="alert('button clicked');">Click Me</button>
            <br/>
            <br/>
            <script type="text/javascript">
            function show(){
                document.write("Hello javascript Event!");
            }
            //show();
            </script>
            <button onclick="show();">Click</button>
        </body>
    </head>
</html>
