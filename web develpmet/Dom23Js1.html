<!DOCTYPE html>
<html>
    <head>
        <body>
            

            <input id="demo" type="text"/>

            <button type="button" onclick="myFunction()">Test input</button>
            <p id="message"></p>
<script>
function myFunction(){
    var x;
    try{
        var x=document.getElementById("demo").value;

        if(x=="")throw "empty";
        if(isNaN(x))throw "Not a number";
        x=Number(x);
        if(x<5)throw"too low";
        if(x>10)throw "too high";
    }
    catch(error){
        document.getElementById("message").innerHTML="Input is"+error;
    }
    if(x>=5 && x<=10){
        document.getElementById("message").innerHTML="Input is right";
    }
}
</script>

        </body>
    </head></html>
