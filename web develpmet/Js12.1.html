<!DOCTYPE html>
<head>
    <body>
        <script>
            /*The slice() method returns the selected elements in an array,
             as a new array object. The slice() method selects 
            the elements starting at the given start argument,
             and ends at, but does not include, the given end argument*/
             var str="Hello friends how are you";
         document.write(str.slice(0,14));
         document.write("<hr>");
         /*The substring() method extracts the characters from a string, 
         between two specified indices, and returns the new sub string. This method 
         extracts the characters in a string between "start" and "end", not including "end" itself.*/
         var str="Hello friends how are you";
         document.write(str.substring(8,14));
         document.write("<hr>");
         /*The substr() method extracts parts of a string, beginning 
         at the character at the specified position, and returns the specified number of characters*/
         var str="Hello friends how are you";
         document.write(str.substr(2,10));
        </script>
    </body>
</head>
