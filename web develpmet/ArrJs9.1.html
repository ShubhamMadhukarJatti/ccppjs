<!DOCTYPE html>
<html>
    <head>
        <body>
            <script>
                //Join method
                var arr=["Rahul","Sonam","Sumit"];

                //separated by /
                var new_arr=arr.join("/");
                document.write(new_arr+"<br>");
                document.write("<br/>");

                //separated by or
                var new_arr=arr.join(" or ");
                document.write(new_arr+"<br>");
                document.write("<br/>");

                //speparated by no space
                var new_arr=arr.join(" ");
                document.write(new_arr+"<br>");
            </script>
        </body>
    </head>
</html>
