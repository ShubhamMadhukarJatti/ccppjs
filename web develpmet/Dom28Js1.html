<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tree</title>
</head>
<body>
    <h1>We are Learning JS</h1>
    <h1>Hello World</h1>
    <h2>Now</h2>
    <p id="para">Hello <span>World</span> <em>World</em><span>JS</span>
    </p>
    <p id="find"><span>Bye</span> World</p>
    <div>
        <p>1st p inside div</p>
        <p>2nd p inside div</p>
    </div>

    <script>
        //for loop
     /*   var result=document.getElementsByTagName("p")[0];
        document.write(result);
        console.log(result);*/

        var data=document.getElementsByTagName("p");
        //console.log(data);
        var len=data.length;
        for(let i=0;i<len;i++){
            var result=document.getElementsByTagName("p")[i];
            document.write(result+"<br>");
            console.log(result);
        }
        //for of loop
        for(const elm of data){
            document.write(elm+"<br>");
            console.log(elm);
        }
    </script>
</body>
</html>
