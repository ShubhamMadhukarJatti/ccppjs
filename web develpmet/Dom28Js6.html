<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title class="para">Tree</title>
</head>
<body>
    <h1>We are Learning JS</h1>
    <h1 class="para myclass">Hello World</h1>
    <h2>Now</h2>
    <p class="para">Hello <span>Pune</span> <em>World</em><span>JS</span></p>
    <p class="myclass"><span>Bye</span> Pune</p>
<div id="show">
    <p>1st p inside div</p>
<p class="para">2nd p inside div</p>
</div>
<script>
    //loop
    var result=document.getElementsByClassName("para")[0];
    document.write(result);
    console.log(result);

    var data=document.getElementsByClassName("para");
    var len=data.length;
    for(let i=0;i<len;i++){
        var result=document.getElementsByClassName("para")[i];
        document.write(result+"<br>");
        console.log(result);
    }
//for of loop
for(const elm of data){
    document.write(elm+"<br>");
    console.log(elm);
}
</script>
