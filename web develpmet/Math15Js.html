<!DOCTYPE html>
<html>
    <head>
        <body>
            <script type="text/javascript">
            document.write(Math.PI,"<br>");//universal value
            document.write(Math.SQRT2,"<br>");//this property is only for 2
            document.write(Math.random(),"<br>");//returns random value greater then zero
            document.write(Math.round(123.7),"<br>");//round value 5<first value as it is//5>1 add
            document.write(Math.ceil(3.3),"<br>");//returens larger near integer value   
            document.write(Math.floor(3.6),"<br>");//returns smallest near integer value
            var a=-3.5;
            document.write(Math.abs(a),"<br>");//returns positive no
            document.write(Math.pow(2,3),"<br>");/*returns 2*2*2 value u can pass(-3,2)or
            (-2,3,2)second parameter negetive is not allowed*/
            document.write(Math.sqrt(9),"<br>");//returns
            document.write(Math.SQRT1_2,"<br>");//returns sqrt of 1/2
            document.write(Math.sin(90),"<br>");//returns sign value of anumber
            document.write(Math.E,"<br>");/*Euler's constant and the base of natural logarithum
            ,approximately 2.718*/ 
            document.write(Math.log(3),"<br>");//retuens the natural logarithum(base E)of number
            document.write(Math.LN2,"<br>");//returns the natural logarithum of 2 and LN10
            document.write(Math.LOG10E,"<br>");//retuens base 10 logrithm of E
            document.write(Math.LN10,"<br>");//returns the base 10 logarithm of E
            document.write(Math.min(1,0,3,7),"<br>");
            document.write(Math.max(1,2,12,7),"<br>");
            </script>
        </body>
    </head>
</html>
