<!DOCTYPE html>
<head>
    
        <script type="text/javascript">

var x=0;
document.write("Entering the loop<br/>");

while(x<11){
    if(x==10){
        break;//break out of loop completely
    }
    x=x+1;
    document.write(x + "<br />");
}
document.write("Exiting the loop!<br />"); 

var x=0;
document.write("Entering the loop<br />");
 while(x<10){
     x=x+1;
     
     if(x==5){
     continue;//skip rest of the loop
 }

 document.write(x +"<br />");
}
 
        </script>
    </head>
</html>
