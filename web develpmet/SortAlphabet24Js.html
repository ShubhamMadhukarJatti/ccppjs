<!DOCTYPE html>
<html>
    <head>
        <body>
            <!---Q3.3.write js function to sort alphabets-->
            <h2>JavaScript Array</h2>
            <p>The Array.sort() method sorted the element of an array</p>
            <p id="demo"></p>
            <p id="demos"></p>
            <script>
                const fruits=["Banana","Orange","Apple","Mango"];
                document.getElementById("demo").innerHTML=fruits.sort();
      
                const flower=["Rose","Marigold","daisy","Azalea","Cornflower","Peony"];
                document.getElementById("demos").innerHTML=flower.sort();
            </script>
        </body>
    </head>
</html>
