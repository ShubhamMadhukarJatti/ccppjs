<!DOCTYPE html>
<html>
    <head>
        <script>
            //Day as number 1-31
            //Hours as number 0-23
            //Mouth as Number 0-11 Ex- 0=Jan
            //Week Day as Number 0-6 Ex-0=Sun

        var tarikh=new Date();
        document.write(tarikh+"<br>");

        tarikh.setHours(20);
        document.write(tarikh+"<br>");

        tarikh.setMinutes(50);
        document.write(tarikh+"<br>");

        tarikh.setSeconds(40);
        document.write(tarikh+"<br>");

        tarikh.setDate(21);
        document.write(tarikh+"<br>");

        tarikh.setMonth(7);
        document.write(tarikh+"<br>");

        tarikh.setFullYear(2023);
        document.write(tarikh+"<br>");

        tarikh.setFullYear(2022, 3, 15);
        document.write(tarikh+"<br>");

        </script>
    </head>
</html>
