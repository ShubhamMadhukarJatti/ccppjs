<!DOCTYPE html>
<html>

        <body>
            <h1>Event Handling with javascript</h1>
            <button id="mybtn">Click Me</button>

            <script>
                var btn=document.getElementById("mybtn");
                console.log(btn);
                btn.onclick=function(){ alert("Button Clicked");};

                   alert("Button Clicked 111");}; */
            </script>
        </body>
    </head>
</html>
