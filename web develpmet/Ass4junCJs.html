<!DOCTYPE html>
<html>
    <head>
        <body><title>Area of Circle</title>
            <script>
function Calculate(r)
{
    this.r=r;
    this.perimeter=function(){
        return 2*Math.PI*this.r;//PI-3.14
    };//radius 4/2=2
    this.area=function(){
        return Math.PI*this.r*this.r;
    };
}
var calc=new Calculate(5);
console.log("Area of Circle=",calc.area().toFixed(2));
document.write("Area of Circle=",calc.area().toFixed(2));

console.log("<br>Perimeter of Circle=",calc.perimeter().toFixed(2));
document.write("<br>Perimeter of Circle=",calc.perimeter().toFixed(2));


    //area method.
    
    


    //var Calc=new Calculate(5);
    //document.write("Area=",Calc.area().toFixed(2));
    

            </script>
        </body>
    </head>
</html>
