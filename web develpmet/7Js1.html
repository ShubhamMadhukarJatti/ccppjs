<html>
    <head>
        <body>
            <script>
                //A closure is a function having access to the 
                //parent scope.It preserve the data from outside.

                var i=10;
                function show(){
                    var j=20;
                    document.write(j+"<br>");
                    document.write(i+"<br>");
                }
                show();
                document.write(j+"<br>");
            </script>
        </body>
    </head>
</html>
