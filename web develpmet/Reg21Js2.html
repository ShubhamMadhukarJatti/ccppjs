<!DOCTYPE html>
<html>
    <head>
        <body>
            
                <button onclick="match()">Match</button>

            <script>
                function match(){
                    var str="It time to rhyme A Poem I must write";
                    var res=str.match(/me/g);//will find globally
                    document.write(res);
                }
            </script>
        </body>
    </head>
</html>
