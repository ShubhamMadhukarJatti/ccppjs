<!DOCTYPE html>
<html>
    <head>
        <body>
            <script type="text/javascript">
 var week=["Sunday.","Monday.","Tuesday.","wensday.","Thrsday.","Friday.","saturday."];
 for(var i=0;i<week.length;i++){
     document.write(i+" "+week[i]+"<br>");
 }
 
 document.write("<br/>");
 
document.write(week.reverse());//reverses the elements of an array
 document.write("<br/>");
 document.write("<br/>");

 document.write(week.pop()+"Removed from an array");
 //removes last element from an array
 document.write("<br/>");
 document.write("<br/>");

document.write(week.push(3,5)+"element added to an array");
//adds element to an array.need to pass parameter()element)to want to add.
document.write("<br/>");
document.write("<br/>");

document.write(week.shift()+"Removed from an array");
//remove first element from an array
document.write("<br/>");
document.write("<br/>");

document.write(week.unshift("Hi")+"Added to an array");
//adds element begining to an array
document.write("<br/>");
for(var i=0;i<week.length;i++){
    document.write(i+" "+week[i]+"<br/>");
}
</script>
        </body>
    </head>
</html>
