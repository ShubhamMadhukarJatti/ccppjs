<!DOCTYPE html>
<html>
    <head>
        <body>
        <script>
            function factorial(n){
                if(n==0||n==1){
                    return 1;
                }else{
                    return n* factorial(n-1);
                }
            }
            let n=4; 
            answer=factorial(n);
            console.log("the factorial of"+n+"is "+answer);
        </script>
        </body>
    </head>
</html>
