<!DOCTYPE html>
<html>
    <head>
        <script type="text/javascript">
       
        var a=true;
        var b=false;
        var linebreak="<br />";

        document.write("(a && b) =>");
        reslut=(a && b);
        document.write(reslut);
        document.write(linebreak);

        document.write("(a || b) =>");
        reslut=(a || b);
        document.write(reslut);
        document.write(linebreak);

        document.write("!(a && b) =>");
        reslut=!(a && b);
        document.write(reslut);
        document.write(linebreak);


        document.write("<br /><b>while statement:</b>");
var x=0;
  
     
     while(x<11){
        document.write("<br />Current Count"+x);
x++;
     }
        </script>
    </head>
</html>
