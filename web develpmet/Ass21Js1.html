<!DOCTYPE html>

    <head>
        <meta charset="utf-8">
        <title>Count number of words in a string</title>
        <style type="text/css">
        body{margin-top:40px;}
        </style>
          </head>
          <body>
              <textarea id="InputText" cols="30" rows="4">The quick brown fox jump over
                   the lazy dog and cat.</textarea><br>
<input type="button"name="Convert" value="No.of Words"onClick="count_words();">
<input id="noofwords"type="text" value=""size="6">
                   <!--Q2.write Js function which will display 4 digit no.
            from the string use R.E
        var str="We are 1234"
    learing 5678 javascript 23";
find 3 letter word from the string-->
        </body>
  <script>
      function count_words(){
          str1=document.getElementById("InputText").value;
          //exclude start and end white- space
          str1=str1.replace(/(^\s*)|(\s*$)/gi,"");
          str1=str1.replace(/[ ]{2,}/gi," ");
          str1=str1.replace(/\n /,"\n");
          document.getElementById("noofwords").value=str1.split(' ').length;
      }
  </script>
</htmL>
