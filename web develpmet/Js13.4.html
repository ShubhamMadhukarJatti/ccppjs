<!DOCTYPE html>
<html>
    <head>
        <body>
            <script>
                var tarikh=new Date();
                document.write(tarikh.toString()+"<br>");
                document.write(tarikh.toUTCString()+"<br>");
                document.write(tarikh.toGMTString()+"<br>");
                document.write("<hr>");
                var tarikh=new Date("2018-06-21T12:00:00-06:30");
                document.write(tarikh+"<br>");
            </script>
        </body>
    </head>
</html>
